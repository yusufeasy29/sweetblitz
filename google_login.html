<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google ile Giriş Yap</title>
  <meta name="google-signin-client_id" content="804041541426-6c0vd2u7gm058a31hjetf2b9bh5b04s1.apps.googleusercontent.com">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
    }

    body {
      background: #f0f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 28px;
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      border: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Real Google Logo SVG */
    .google-logo {
      width: 75px;
      height: 24px;
    }

    h1 {
      font-size: 1.45rem;
      font-weight: 400;
      color: #1f1f1f;
      text-align: center;
    }

    p.subtitle {
      font-size: 0.92rem;
      color: #444746;
      text-align: center;
      line-height: 1.5;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: #e0e0e0;
    }

    /* Google Sign-In button container */
    #google-btn-container {
      display: flex;
      justify-content: center;
      width: 100%;
      min-height: 44px;
    }

    .loading-text {
      font-size: 0.9rem;
      color: #5f6368;
      text-align: center;
      display: none;
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .success-icon {
      font-size: 3rem;
    }

    .success-name {
      font-size: 1.1rem;
      font-weight: 500;
      color: #1f1f1f;
    }

    .success-email {
      font-size: 0.85rem;
      color: #5f6368;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4285F4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite, colorChange 3s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes colorChange {
      0%, 100% { border-top-color: #4285F4; }
      25% { border-top-color: #EA4335; }
      50% { border-top-color: #FBBC05; }
      75% { border-top-color: #34A853; }
    }

    .note {
      font-size: 0.78rem;
      color: #9aa0a6;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">

    <!-- Google Logo (gerçek renkler) -->
    <svg class="google-logo" viewBox="0 0 74 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M9.24 11.2V9.06h8.24c.08.45.12.92.12 1.48 0 1.8-.49 3.52-1.39 4.88-1.04 1.57-2.6 2.76-4.52 3.32C9.77 19.3 7.6 19 5.86 17.92A9.4 9.4 0 0 1 2 10c0-2.8 1.14-5.38 3.14-7.23C7.03 1.03 9.77.34 12.3.82c2.14.4 4.02 1.62 5.25 3.37l-1.92 1.93a6.83 6.83 0 0 0-3.66-2.02c-1.89-.35-3.93.18-5.38 1.39C5.1 6.83 4.3 8.79 4.3 10.82c0 2.2 1.05 4.3 2.8 5.56 1.49 1.08 3.52 1.44 5.3 1.02a6.38 6.38 0 0 0 4.14-3.1 6.13 6.13 0 0 0 .66-3.1H9.24Z" fill="#4285F4"/>
      <path d="M26.2 6.77c2.27 0 4.24 1.34 5 3.36.75 2 0 4.3-1.63 5.67a5.2 5.2 0 0 1-6.74 0c-1.63-1.37-2.38-3.67-1.63-5.67.76-2.02 2.73-3.36 5-3.36Zm0 2.15a3.1 3.1 0 0 0-2.85 3.08c0 1.7 1.25 3.1 2.85 3.1a3.1 3.1 0 0 0 2.85-3.1 3.1 3.1 0 0 0-2.85-3.08Z" fill="#EA4335"/>
      <path d="M38.8 6.77c2.27 0 4.24 1.34 5 3.36.75 2 0 4.3-1.63 5.67a5.2 5.2 0 0 1-6.74 0c-1.63-1.37-2.38-3.67-1.63-5.67.76-2.02 2.73-3.36 5-3.36Zm0 2.15a3.1 3.1 0 0 0-2.85 3.08c0 1.7 1.25 3.1 2.85 3.1a3.1 3.1 0 0 0 2.85-3.1 3.1 3.1 0 0 0-2.85-3.08Z" fill="#FBBC05"/>
      <path d="M51.2 6.77c1.78 0 3.38 1 4.19 2.53v-2.1h2.15v9.88c0 2.52-1.34 4.52-3.78 5.1a6.6 6.6 0 0 1-5.18-.5l.8-1.8c1.13.73 2.73.96 3.73.34 1.05-.66 1.48-1.95 1.48-3.2v-1.12c-.8 1.49-2.4 2.5-4.19 2.5-2.27 0-4.24-1.34-5-3.36a6.18 6.18 0 0 1 1.63-5.67 5.2 5.2 0 0 1 3.37-1.27Zm.15 2.15a3.1 3.1 0 0 0-2.85 3.08c0 1.7 1.25 3.1 2.85 3.1a3.1 3.1 0 0 0 2.85-3.1 3.1 3.1 0 0 0-2.85-3.08Z" fill="#4285F4"/>
      <path d="M62.6.46h2.24v16.12H62.6V.46Z" fill="#34A853"/>
      <path d="M73.2 13.54l1.72 1.15c-.9 1.32-2.4 2.1-4.12 2.1-2.97 0-5.1-2.12-5.1-5.1 0-2.96 2.15-5.08 5.08-5.08 1.7 0 3.16.8 4.06 2.1l-1.72 1.18c-.48-.75-1.32-1.22-2.34-1.22-1.66 0-2.9 1.27-2.9 3.02s1.24 3 2.9 3c1.02 0 1.86-.47 2.42-1.15Z" fill="#EA4335"/>
    </svg>

    <div id="content-section" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:20px;">
      <h1>Hesabınızla giriş yapın</h1>
      <p class="subtitle"><strong>Sweet Blitz</strong> uygulamasına devam etmek için Google hesabınızı seçin</p>

      <div class="divider"></div>

      <!-- Gerçek Google Sign-In Butonu -->
      <div id="google-btn-container"></div>

      <p class="loading-text" id="loading-txt">SDK yükleniyor, lütfen bekleyin...</p>

      <div class="divider"></div>

      <p class="note">Giriş yaparak Sweet Blitz'in ilerlemeniz, puanlarınız ve oyun verilerinizi kaydetmesine izin vermiş olursunuz.</p>
    </div>

    <!-- Başarı Ekranı -->
    <div class="success-overlay" id="success-section">
      <div class="spinner" id="success-spinner"></div>
      <p class="success-name" id="success-name-txt">Giriş yapılıyor...</p>
      <p class="success-email" id="success-email-txt"></p>
    </div>

  </div>

  <script>
    const CLIENT_ID = '804041541426-6c0vd2u7gm058a31hjetf2b9bh5b04s1.apps.googleusercontent.com';

    function handleCredential(response) {
      try {
        // JWT token çözümle
        const base64Url = response.credential.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(
          atob(base64).split('').map(c =>
            '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
          ).join('')
        );

        const payload = JSON.parse(jsonPayload);
        const name    = payload.name    || 'Google Oyuncusu';
        const email   = payload.email   || '';
        const picUrl  = payload.picture || '';
        const letter  = name.charAt(0).toUpperCase();

        // Başarı ekranını göster
        document.getElementById('content-section').style.display = 'none';
        const successSec = document.getElementById('success-section');
        successSec.style.display = 'flex';
        document.getElementById('success-name-txt').innerText = name + ' olarak giriş yapılıyor...';
        document.getElementById('success-email-txt').innerText = email;

        // Ana pencereye veriyi gönder ve kapat
        setTimeout(() => {
          if (window.opener) {
            window.opener.postMessage({
              type: 'google-login-success',
              name: name,
              email: email,
              bgClass: 'avatar-blue',
              letter: letter,
              picUrl: picUrl
            }, '*');
          }
          window.close();
        }, 1200);

      } catch (err) {
        console.error('Token decode hatası:', err);
        alert('Giriş sırasında bir hata oluştu. Lütfen tekrar deneyin.');
      }
    }

    function initGSI() {
      if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
        document.getElementById('loading-txt').style.display = 'none';

        google.accounts.id.initialize({
          client_id: CLIENT_ID,
          callback: handleCredential,
          auto_select: false,
          cancel_on_tap_outside: false
        });

        // Gerçek Google butonunu render et
        google.accounts.id.renderButton(
          document.getElementById('google-btn-container'),
          {
            type: 'standard',
            theme: 'outline',
            size: 'large',
            text: 'signin_with',
            shape: 'rectangular',
            logo_alignment: 'left',
            width: 280
          }
        );

        // One Tap da dene
        google.accounts.id.prompt();

      } else {
        // SDK henüz yüklenmediyse 500ms sonra tekrar dene
        document.getElementById('loading-txt').style.display = 'block';
        setTimeout(initGSI, 500);
      }
    }

    // Sayfa yüklenince başlat
    window.addEventListener('load', () => {
      setTimeout(initGSI, 300);
    });
  </script>
</body>
</html>
